<!DOCTYPE html>
<html class="dark" lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contacto - New Records</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="assets/css/styles.css" rel="stylesheet"/>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-left">
        <a class="logo-link" href="index.html">
          <span class="material-symbols-outlined logo-icon">album</span>
          <span class="logo-text">New Records</span>
        </a>
        <nav class="nav-main">
          <a class="nav-link" href="index.html">Inicio</a>
          <a class="nav-link" href="categorias.html">Categorías</a>
          <a class="nav-link" href="productos.html">Productos</a>
          <a class="nav-link active" href="contacto.html">Contacto</a>
        </nav>
      </div>
      <button class="nav-toggle" type="button" aria-label="Abrir menú">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <nav class="nav-mobile" id="navMobile">
        <a class="nav-link" href="index.html">Inicio</a>
        <a class="nav-link" href="categorias.html">Categorías</a>
        <a class="nav-link" href="productos.html">Productos</a>
        <a class="nav-link active" href="contacto.html">Contacto</a>
      </nav>
    </div>
  </header>

  <main class="contact-main">
    <div class="container">
      <div class="contact-grid">
        <section class="contact-form-wrapper" aria-labelledby="form-title">
          <h2 id="contact-info-title" class="contact-info-title">Contáctanos</h2>
          <form class="contact-form" id="contactForm" novalidate action="#" method="post">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="name">Nombre</label>
                <input class="form-input" id="name" name="name" type="text" required aria-describedby="nameError"/>
                <span class="error-message" id="nameError" role="alert"></span>
              </div>
              <div class="form-group">
                <label class="form-label" for="city">Ciudad</label>
                <input class="form-input" id="city" name="city" type="text" required aria-describedby="cityError"/>
                <span class="error-message" id="cityError" role="alert"></span>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input class="form-input" id="email" name="email" type="email"  required aria-describedby="emailError"/>
              <span class="error-message" id="emailError" role="alert"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="subject">Asunto</label>
              <input class="form-input" id="subject" name="subject" type="text"  required aria-describedby="subjectError"/>
              <span class="error-message" id="subjectError" role="alert"></span>
            </div>
            <div class="form-group">
              <label class="form-label" for="description">Descripción</label>
              <textarea class="form-textarea" id="description" name="description" rows="4" placeholder="¿En qué podemos ayudarte?" required aria-describedby="descriptionError"></textarea>
              <span class="error-message" id="descriptionError" role="alert"></span>
            </div>
            <button class="btn btn-primary btn-submit" type="submit">
              Enviar mensaje
              <span class="material-symbols-outlined">send</span>
            </button>
            <div class="success-message" id="successMessage">
              <span class="material-symbols-outlined">check_circle</span>
              Mensaje recibido. Te responderemos pronto.
            </div>
          </form>
        </section>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-copy">© 2026 New Records. Todos los derechos reservados.</p>
    </div>
  </footer>

  <script src="assets/js/script.js"></script>
</body>
</html>
